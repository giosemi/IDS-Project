spring.application.name=artid-backend

spring.config.import=optional:file:./application-local.properties

# PostgreSQL — sovrascrivere con variabili d'ambiente in produzione
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/artiddb}
spring.datasource.username=${DB_USER:artid}
spring.datasource.password=${DB_PASSWORD:artid}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:cambia-questo-segreto-in-produzione-deve-essere-lungo-almeno-256-bit!!}
jwt.expiration-ms=86400000

# Gmail SMTP — vedi application-local.properties.example
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

artid.mail.from=${MAIL_FROM:${spring.mail.username:}}

# Mostra OTP in risposta API solo se l'email non è configurata
otp.expose-in-response=${OTP_EXPOSE_IN_RESPONSE:true}

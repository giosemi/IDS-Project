spring.application.name=artid-backend

# PostgreSQL — sovrascrivere con variabili d'ambiente in produzione
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/artiddb}
spring.datasource.username=${DB_USER:artid}
spring.datasource.password=${DB_PASSWORD:artid}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:cambia-questo-segreto-in-produzione-deve-essere-lungo-almeno-256-bit!!}
jwt.expiration-ms=86400000
